services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: session-vault-backend
    env_file:
      - .env
    environment:
      - PORT=${PORT:-4000}
      - VAULT_ROOT=${VAULT_ROOT:-/data/vault}
      - API_BASE=${API_BASE:-/api/v1/vault}
      - NODE_ENV=${NODE_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - VAULT_API_KEY_ADMIN=${VAULT_API_KEY_ADMIN:-}
      - VAULT_API_KEY_OPERATOR=${VAULT_API_KEY_OPERATOR:-}
      - VAULT_API_KEY_READER=${VAULT_API_KEY_READER:-}
      - INDEX_DB_PATH=${INDEX_DB_PATH:-/data/vault/memory/index.db}
      - COMPACTION_INTERVAL_MS=${COMPACTION_INTERVAL_MS:-0}
    ports:
      - "4000:4000"
    volumes:
      - ./vault:/data/vault
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: session-vault-frontend
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${FRONTEND_PORT:-3000}
      - NEXT_PUBLIC_VAULT_API_BASE=${NEXT_PUBLIC_VAULT_API_BASE:-http://backend:4000/api/v1/vault}
      - NEXT_PUBLIC_VAULT_API_KEY=${NEXT_PUBLIC_VAULT_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
